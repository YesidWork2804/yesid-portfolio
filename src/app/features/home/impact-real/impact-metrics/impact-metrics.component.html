<div class="mt-8 grid grid-cols-1 sm:grid-cols-3 gap-4" [staggerChildren]="true" appViewportAnimate="fade-up">
  @for (m of metrics; track m.labelKey) {
    <div data-stagger class="opacity-0 translate-y-4 ui-transition duration-700 rounded-2xl border border-white/10 bg-white/70 dark:bg-surface/40 dark:border-slate-800/80 backdrop-blur p-6">
      <div class="flex items-center justify-between">
        <div class="text-4xl font-semibold tracking-tight text-slate-900 dark:text-slate-100 ui-transition">
          <app-animated-counter [value]="m.value" [prefix]="m.prefix || ''" [suffix]="m.suffix || ''" />
        </div>

        <div class="h-11 w-11 rounded-xl bg-primary/10 text-primary grid place-items-center border border-primary/15">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path [attr.d]="iconPath(m.icon)" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
      </div>

      <div class="mt-3 text-sm text-slate-700 dark:text-slate-200 ui-transition">
        {{ m.labelKey | translate }}
      </div>
    </div>
  }
</div>
