<div class="mt-8" appViewportAnimate="fade-up">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (it of items; track it.src) {
      <button
        type="button"
        class="w-full rounded-2xl overflow-hidden border border-white/10 dark:border-slate-800/80 bg-white/60 dark:bg-surface/40 backdrop-blur ui-transition hover:shadow-md"
        (click)="openAt($index)"
      >
        <div class="relative">
          <img
            [src]="it.src"
            alt=""
            loading="lazy"
            (load)="markLoaded($index)"
            class="w-full aspect-[4/3] object-cover ui-transition"
            [class.blur-md]="!isLoaded($index)"
            [class.scale-[1.03]]="!isLoaded($index)"
            [class.opacity-70]="!isLoaded($index)"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-slate-950/35 via-transparent to-transparent"></div>
        </div>

        <div class="p-4">
          <div class="min-h-10 flex items-center justify-center text-center text-sm font-medium leading-snug text-slate-800 dark:text-slate-100 ui-transition line-clamp-2">
            {{ it.captionKey | translate }}
          </div>
        </div>
      </button>
    }
  </div>
</div>
