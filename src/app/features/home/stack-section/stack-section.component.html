<div appViewportAnimate="fade-up">
  <h2 class="heading-lg text-slate-900 dark:text-slate-100 ui-transition">
    {{ 'stack.title' | translate }}
  </h2>
  <p class="mt-4 text-slate-600 dark:text-slate-300 ui-transition max-w-3xl">
    {{ 'stack.subtitle' | translate }}
  </p>

  <div class="mt-10 grid grid-cols-1 lg:grid-cols-2 gap-4" [staggerChildren]="true" appViewportAnimate="fade-up">
    @for (c of categories; track c.id) {
      <div data-stagger class="opacity-0 translate-y-4 ui-transition duration-700 rounded-2xl border border-slate-200/70 dark:border-slate-800 bg-white dark:bg-surface-100 p-6">
        <div class="text-sm font-semibold text-slate-900 dark:text-slate-100 ui-transition">
          {{ c.titleKey | translate }}
        </div>

        <div class="mt-5 flex flex-wrap gap-2">
          @for (name of c.skills; track name) {
            <span class="inline-flex items-center gap-3 px-4 py-2 rounded-full border border-slate-200/70 dark:border-slate-700 text-sm text-slate-800 dark:text-slate-100 bg-white/60 dark:bg-surface ui-transition">
              <app-tech-icon [name]="name" [size]="22" />
              <span class="truncate max-w-[260px]">{{ name }}</span>
            </span>
          }
        </div>
      </div>
    }
  </div>
</div>
